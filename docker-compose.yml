services:
  db:
    image: postgres
    environment:
      - POSTGRES_USER=pokedex
      - POSTGRES_DB=pokedex
      - POSTGRES_PASSWORD=pokedex
    ports:
      - 5342:5432
    volumes:
      - db_data:/var/lib/postgresql
  drizzle-gateway:
    image: ghcr.io/drizzle-team/gateway:latest
    ports:
      - "4986:4983"
    depends_on:
      - db
    environment:
      - STORE_PATH=/app
      - DATABASE_URL=postgresql://pokedex:pokedex@db:5432/pokedex
    volumes:
      - drizzle-gateway-data:/app

volumes:
  db_data:
  drizzle-gateway-data:
